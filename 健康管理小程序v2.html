// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  var ss = useState('splash'); var screen = ss[0]; var setScreen = ss[1];
  var ts = useState('chats'); var tab = ts[0]; var setTab = ts[1];
  var cs = useState(null); var openChat = cs[0]; var setOpenChat = cs[1];

  function go(s){ setScreen(s); }

  function openChatId(id) {
    setOpenChat(id);
  }

  // onboarding flow
  if(screen==='splash') return React.createElement(Splash, {onNext:function(){go('type');}});
  if(screen==='type')   return React.createElement(TypeSelect, {onNext:function(){go('form');},onBack:function(){go('splash');}});
  if(screen==='form')   return React.createElement(FormStep, {onNext:function(){go('medical');},onBack:function(){go('type');}});
  if(screen==='medical') return React.createElement(Medical, {onNext:function(){go('build');},onBack:function(){go('form');}});
  if(screen==='build')  return React.createElement(Build, {onNext:function(){go('team');}});
  if(screen==='team')   return React.createElement(TeamSelect, {onNext:function(){go('journey');}});
  if(screen==='journey') return React.createElement(JourneyMap, {onBack:function(){go('team');},onNext:function(){go('service');}});
  if(screen==='service') return React.createElement(ServiceGuide, {onBack:function(){go('journey');},onNext:function(){go('main');setTab('chats');}});

  // sub-screens
  if(openChat==='fr')   return React.createElement(FollowupDetail, {onBack:function(){setOpenChat(null);}});
  if(openChat==='mr')   return React.createElement(MedDetail, {onBack:function(){setOpenChat(null);}});
  if(openChat)          return React.createElement(ChatDetail, {cid:openChat,onBack:function(){setOpenChat(null);}});

  // main
  return React.createElement('div', {style:{position:'relative',width:'100%',height:'100%'}},
    tab==='chats'   && React.createElement(ChatList, {onOpen:openChatId}),
    tab==='checkin' && React.createElement(Checkin, null),
    tab==='profile' && React.createElement(Profile, null),

    React.createElement('div', {className:'bnav'},
      [['chats','💬','消息'],['checkin','📅','健康打卡'],['profile','👤','我的']].map(function(it) {
        return React.createElement('div', {
          key:it[0],
          className:'nitem '+(tab===it[0]?'on':''),
          onClick:function(){setTab(it[0]);}
        },
          React.createElement('div', {className:'nico'}, it[1]),
          React.createElement('div', {className:'nlbl'}, it[2])
        );
      })
    )
  );
}

ReactDOM.render(React.createElement(App, null), document.getElementById('root'));
</script>
