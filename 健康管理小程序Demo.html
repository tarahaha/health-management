<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康管家 · C端原型Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #1a0a00; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; }

  .device-wrap { position: relative; width: 390px; height: 844px; }
  .device-frame {
    width: 390px; height: 844px;
    background: #fff8f3;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 2px #2a1200, 0 0 0 6px #1a0a00, 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,150,80,0.15);
  }
  .status-bar {
    height: 44px; background: transparent; display: flex; align-items: center;
    justify-content: space-between; padding: 0 24px; position: relative; z-index: 100;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #1f1200; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons span { font-size: 12px; color: #1f1200; }

  .screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .screen::-webkit-scrollbar { display: none; }

  /* Transitions */
  .slide-enter { animation: slideIn 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
  .slide-back { animation: slideBack 0.35s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }
  @keyframes slideBack { from { transform: translateX(-30%); opacity:0.5 } to { transform: translateX(0); opacity:1 } }
  @keyframes fadeUp { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
  @keyframes shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes ripple { 0%{transform:scale(0);opacity:1} 100%{transform:scale(4);opacity:0} }
  @keyframes countUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes chatIn { from{transform:translateX(-20px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes chatInRight { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* Orange palette */
  :root {
    --o1: #FF6B2B;
    --o2: #FF8E53;
    --o3: #FFA970;
    --o4: #FFD4B8;
    --o5: #FFF0E8;
    --o6: #FFF8F3;
    --gold: #F59E0B;
    --text: #1F1200;
    --text2: #7C4A2D;
    --text3: #B07050;
    --green: #10B981;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --red: #EF4444;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--o1), var(--o2));
    color: #fff; border: none; border-radius: 16px; padding: 16px 32px;
    font-size: 17px; font-weight: 600; cursor: pointer; width: 100%;
    box-shadow: 0 8px 24px rgba(255,107,43,0.4);
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-primary:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(255,107,43,0.3); }

  .btn-ghost {
    background: transparent; color: var(--o1); border: 2px solid var(--o1);
    border-radius: 16px; padding: 14px 32px; font-size: 16px; font-weight: 600;
    cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .btn-ghost:active { background: var(--o5); }

  .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(255,107,43,0.08); }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,107,43,0.1);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: 16px; z-index: 200;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 16px; border-radius: 12px; transition: all 0.2s; }
  .nav-item.active .nav-icon { color: var(--o1); }
  .nav-item.active .nav-label { color: var(--o1); }
  .nav-icon { font-size: 22px; color: #ccc; transition: all 0.2s; }
  .nav-label { font-size: 11px; color: #ccc; font-weight: 500; }

  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .tag-orange { background: var(--o5); color: var(--o1); }
  .tag-green { background: #D1FAE5; color: #059669; }
  .tag-blue { background: #DBEAFE; color: #2563EB; }
  .tag-purple { background: #EDE9FE; color: #7C3AED; }

  /* Avatar ring */
  .avatar-ring {
    width: 120px; height: 120px; border-radius: 50%;
    background: conic-gradient(var(--o1) 0deg 252deg, #f0f0f0 252deg 360deg);
    display: flex; align-items: center; justify-content: center;
    position: relative; animation: float 3s ease-in-out infinite;
  }
  .avatar-inner {
    width: 104px; height: 104px; border-radius: 50%;
    background: linear-gradient(135deg, #FFE4CC, #FFD0A8);
    display: flex; align-items: center; justify-content: center; font-size: 48px;
  }

  /* Progress bar */
  .progress-bar { height: 8px; background: #F0E8E0; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

  /* Chat styles */
  .chat-bubble-left {
    background: #fff; border-radius: 0 16px 16px 16px;
    padding: 12px 16px; max-width: 240px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-size: 14px; line-height: 1.6; color: var(--text);
    animation: chatIn 0.3s ease;
  }
  .chat-bubble-right {
    background: linear-gradient(135deg, var(--o1), var(--o2));
    border-radius: 16px 0 16px 16px;
    padding: 12px 16px; max-width: 240px;
    font-size: 14px; line-height: 1.6; color: #fff;
    animation: chatInRight 0.3s ease; box-shadow: 0 4px 12px rgba(255,107,43,0.3);
  }

  /* Input */
  .input-field {
    width: 100%; border: 2px solid #F0E4DA; border-radius: 14px;
    padding: 14px 16px; font-size: 15px; outline: none; background: var(--o6);
    transition: border 0.2s; color: var(--text);
  }
  .input-field:focus { border-color: var(--o1); background: #fff; }

  .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>
<div class="device-wrap">
  <div class="device-frame" id="app"></div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Icons ───────────────────────────────────────────────────────────────────
const icons = {
  home: "🏠", calendar: "📅", chat: "💬", profile: "👤",
  back: "←", check: "✓", star: "⭐", fire: "🔥",
  heart: "❤️", brain: "🧠", food: "🥗", run: "🏃",
  pill: "💊", doc: "📋", bell: "🔔", camera: "📷",
  send: "➤", plus: "＋", trophy: "🏆", target: "🎯",
  chart: "📊", shield: "🛡️", smile: "😊", leaf: "🌿",
  wave: "👋", rocket: "🚀", gem: "💎", lock: "🔒"
};

// ─── Data ────────────────────────────────────────────────────────────────────
const PATIENT_TYPES = [
  { id: "high", emoji: "⚠️", label: "高危筛查", sub: "尚未确诊，定期检查", color: "#FF6B2B", bg: "#FFF0E8", desc: "专属高危人群管理方案，定期推送筛查提醒" },
  { id: "pre", emoji: "🏥", label: "术前准备", sub: "确诊，等待手术", color: "#8B5CF6", bg: "#EDE9FE", desc: "术前营养强化、心理疏导、手术注意事项指导" },
  { id: "post", emoji: "💪", label: "术后康复", sub: "手术完成，康复中", color: "#10B981", bg: "#D1FAE5", desc: "个性化康复计划、营养方案、并发症预防监测" },
];

const ASSISTANTS = [
  { id: "nav", emoji: "🗺️", name: "导航助手", sub: "全程引路", color: "#FF6B2B", bg: "#FFF0E8" },
  { id: "eval", emoji: "📋", name: "健康评估", sub: "状态分析", color: "#8B5CF6", bg: "#EDE9FE" },
  { id: "follow", emoji: "📅", name: "随访管家", sub: "定期跟踪", color: "#3B82F6", bg: "#DBEAFE" },
  { id: "monitor", emoji: "📊", name: "健康监测", sub: "实时预警", color: "#10B981", bg: "#D1FAE5" },
  { id: "nutrition", emoji: "🥗", name: "营养顾问", sub: "饮食方案", color: "#F59E0B", bg: "#FEF3C7" },
  { id: "rehab", emoji: "🏃", name: "康复教练", sub: "运动计划", color: "#EF4444", bg: "#FEE2E2" },
  { id: "psych", emoji: "🧠", name: "心理疏导", sub: "情绪支持", color: "#EC4899", bg: "#FCE7F3" },
  { id: "med", emoji: "💊", name: "用药管理", sub: "安全用药", color: "#6366F1", bg: "#E0E7FF" },
];

const CHATS = {
  nutrition: [
    { role: "ai", text: "您好！我是您的专属营养顾问 🥗\n基于您的术后恢复情况，我为您制定了今日饮食方案，需要查看吗？", delay: 0 },
    { role: "user", text: "好的，帮我看看", delay: 800 },
    { role: "ai", text: "根据您当前状态（术后第14天，体重54.2kg），今日推荐：\n\n🌅 早餐：藕粉+蒸蛋羹+温牛奶\n☀️ 午餐：软米饭+清蒸鱼+菠菜豆腐\n🌙 晚餐：小米粥+肉末嫩豆腐\n\n目标蛋白质：80g/天", delay: 1200 },
    { role: "user", text: "我最近吞咽有点不舒服", delay: 2000 },
    { role: "ai", text: "了解！吞咽不适在术后2周很常见 💙\n\n建议：\n① 食物调整为「流质→半流质」过渡\n② 每次进食量控制在100ml以内\n③ 进食后保持直立30分钟\n\n已为您上报医护团队，今天下午护士会联系您 ✅", delay: 2800 },
  ],
  monitor: [
    { role: "ai", text: "您好！今日健康数据已同步 📊\n\n检测到您的体重较昨天减少0.8kg，需要关注！", delay: 0 },
    { role: "user", text: "有点担心，正常吗？", delay: 800 },
    { role: "ai", text: "别担心～ 短期体重波动在正常范围内 💪\n\n近7天趋势分析：\n📈 体重：53.4kg → 54.2kg（整体上升）\n💧 今日下降可能与进食量减少有关\n\n建议今日多补充蛋白质，明日复测", delay: 1500 },
  ],
  psych: [
    { role: "ai", text: "嗨～最近感觉怎么样？😊\n我注意到您今天的心情日记还没填写，来聊聊吧", delay: 0 },
    { role: "user", text: "最近情绪低落，有点担心复发", delay: 800 },
    { role: "ai", text: "谢谢您愿意告诉我 💙 这种担心完全可以理解，很多术后患者都有这样的感受。\n\n您愿意说说，主要是什么时候会特别担心呢？", delay: 1400 },
  ],
};

const CHECKIN_ITEMS = [
  { id: "weight", emoji: "⚖️", label: "体重", unit: "kg", value: "54.2", color: "#FF6B2B", done: true },
  { id: "bp", emoji: "🩺", label: "血压", unit: "mmHg", value: "118/76", color: "#8B5CF6", done: true },
  { id: "temp", emoji: "🌡️", label: "体温", unit: "℃", value: "36.5", color: "#10B981", done: false },
  { id: "food", emoji: "🥗", label: "饮食记录", unit: "", value: "已记录2餐", color: "#F59E0B", done: true },
  { id: "mood", emoji: "😊", label: "今日心情", unit: "", value: "", color: "#EC4899", done: false },
  { id: "sleep", emoji: "🌙", label: "睡眠质量", unit: "小时", value: "7.5", color: "#6366F1", done: true },
];

// ─── Components ───────────────────────────────────────────────────────────────

function StatusBar({ light = false }) {
  return (
    <div className="status-bar" style={{ background: "transparent" }}>
      <div className="status-time" style={{ color: light ? "#fff" : "#1f1200" }}>9:41</div>
      <div className="status-icons">
        <span style={{ color: light ? "#fff" : "#1f1200" }}>●●●</span>
        <span style={{ color: light ? "#fff" : "#1f1200" }}>WiFi</span>
        <span style={{ color: light ? "#fff" : "#1f1200" }}>🔋</span>
      </div>
    </div>
  );
}

function BottomNav({ active, onNav }) {
  const items = [
    { id: "home", icon: "🏠", label: "首页" },
    { id: "checkin", icon: "📅", label: "健康打卡" },
    { id: "chat", icon: "💬", label: "助手" },
    { id: "profile", icon: "👤", label: "我的" },
  ];
  return (
    <div className="bottom-nav">
      {items.map(item => (
        <div key={item.id} className={`nav-item ${active === item.id ? "active" : ""}`} onClick={() => onNav(item.id)}>
          <div className="nav-icon">{item.icon}</div>
          <div className="nav-label">{item.label}</div>
        </div>
      ))}
    </div>
  );
}

// ─── Screen 1: Splash ─────────────────────────────────────────────────────────
function SplashScreen({ onNext }) {
  const [show, setShow] = useState(false);
  const [qrScanned, setQrScanned] = useState(false);

  useEffect(() => {
    setTimeout(() => setShow(true), 200);
  }, []);

  return (
    <div className="screen" style={{ background: "linear-gradient(160deg, #FF6B2B 0%, #FF8E53 40%, #FFB347 100%)" }}>
      <StatusBar light />
      <div style={{ padding: "20px 32px 40px", display: "flex", flexDirection: "column", alignItems: "center", minHeight: "800px" }}>

        {/* Logo */}
        <div style={{ marginTop: "40px", opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(-20px)", transition: "all 0.6s" }}>
          <div style={{ width: 80, height: 80, background: "rgba(255,255,255,0.25)", borderRadius: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 40, backdropFilter: "blur(10px)", border: "2px solid rgba(255,255,255,0.3)" }}>
            🌱
          </div>
        </div>

        <div style={{ marginTop: 20, textAlign: "center", opacity: show ? 1 : 0, transition: "all 0.6s 0.2s" }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#fff", letterSpacing: 1 }}>健康管家</div>
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.8)", marginTop: 6 }}>全程陪伴 · 专业管理 · 温暖关怀</div>
        </div>

        {/* QR Card */}
        <div style={{
          marginTop: 48, width: "100%", background: "rgba(255,255,255,0.15)",
          borderRadius: 24, padding: 28, backdropFilter: "blur(20px)",
          border: "1px solid rgba(255,255,255,0.3)",
          opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(20px)", transition: "all 0.6s 0.4s"
        }}>
          {!qrScanned ? (
            <>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 15, color: "rgba(255,255,255,0.9)", marginBottom: 4 }}>扫描医生二维码</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)" }}>加入您的专属健康管理团队</div>
              </div>
              {/* Simulated QR */}
              <div style={{ width: 160, height: 160, background: "#fff", borderRadius: 16, margin: "0 auto 20px", padding: 12, cursor: "pointer" }} onClick={() => setQrScanned(true)}>
                <div style={{ width: "100%", height: "100%", background: "repeating-linear-gradient(0deg, #333 0px, #333 4px, #fff 4px, #fff 8px), repeating-linear-gradient(90deg, #333 0px, #333 4px, #fff 4px, #fff 8px)", backgroundSize: "8px 8px, 8px 8px", borderRadius: 8, position: "relative" }}>
                  <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <div style={{ width: 40, height: 40, background: "#fff", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🌱</div>
                  </div>
                </div>
              </div>
              <div style={{ textAlign: "center", fontSize: 12, color: "rgba(255,255,255,0.6)" }}>👆 点击模拟扫码</div>
            </>
          ) : (
            <div style={{ textAlign: "center", animation: "fadeUp 0.5s ease" }}>
              <div style={{ fontSize: 50, marginBottom: 12 }}>✅</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: "#fff" }}>扫码成功！</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.8)", marginTop: 6 }}>荣科·食管癌专病管理团队</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginTop: 4 }}>主治医师：张明远 · 个案管理师：李华</div>
            </div>
          )}
        </div>

        {/* Feature Pills */}
        <div style={{ display: "flex", gap: 10, marginTop: 32, flexWrap: "wrap", justifyContent: "center", opacity: show ? 1 : 0, transition: "all 0.6s 0.6s" }}>
          {["AI千人千面", "专业医护团队", "全程陪伴", "数据安全"].map(t => (
            <div key={t} style={{ padding: "6px 14px", background: "rgba(255,255,255,0.2)", borderRadius: 20, fontSize: 12, color: "#fff", border: "1px solid rgba(255,255,255,0.3)" }}>
              {t}
            </div>
          ))}
        </div>

        {/* CTA */}
        <div style={{ marginTop: "auto", paddingTop: 40, width: "100%", opacity: show ? 1 : 0, transition: "all 0.6s 0.8s" }}>
          <button className="btn-primary" onClick={onNext} style={{ background: "#fff", color: "#FF6B2B", boxShadow: "0 8px 24px rgba(0,0,0,0.2)" }}>
            开始我的健康管理之旅 →
          </button>
          <div style={{ textAlign: "center", marginTop: 12, fontSize: 12, color: "rgba(255,255,255,0.6)" }}>
            已有1,247位患者加入
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Screen 2: Type Selection ─────────────────────────────────────────────────
function TypeScreen({ onNext, onBack }) {
  const [selected, setSelected] = useState(null);
  const [step, setStep] = useState(0);

  useEffect(() => { setTimeout(() => setStep(1), 100); }, []);

  return (
    <div className="screen slide-enter" style={{ background: "#FFF8F3" }}>
      <StatusBar />
      <div style={{ padding: "0 24px 40px" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
          <div onClick={onBack} style={{ width: 36, height: 36, borderRadius: 12, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}>←</div>
          <div style={{ fontSize: 11, color: "#B07050" }}>步骤 1/3</div>
        </div>

        {/* Progress */}
        <div style={{ display: "flex", gap: 6, marginBottom: 28 }}>
          {[1,2,3].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i === 1 ? "#FF6B2B" : "#F0E4DA", transition: "all 0.3s" }} />)}
        </div>

        <div style={{ opacity: step ? 1 : 0, transition: "all 0.5s" }}>
          <div style={{ fontSize: 24, fontWeight: 700, color: "#1F1200", lineHeight: 1.3, marginBottom: 6 }}>
            您目前处于哪个阶段？
          </div>
          <div style={{ fontSize: 14, color: "#7C4A2D", marginBottom: 28 }}>我们将为您匹配专属管理方案</div>
        </div>

        {/* Type Cards */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {PATIENT_TYPES.map((t, i) => (
            <div key={t.id} onClick={() => setSelected(t.id)}
              style={{
                background: selected === t.id ? t.bg : "#fff",

function ChatScreen({ assistantId, onBack }) {
  const assistant = ASSISTANTS.find(a => a.id === assistantId) || ASSISTANTS[4];
  const chatData = CHATS[assistantId] || CHATS.nutrition;
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [showTyping, setShowTyping] = useState(false);
  const [quick] = useState(["我想了解饮食建议", "最近有些不舒服", "查看我的数据", "联系医生"]);
  const endRef = useRef(null);
  const msgIdx = useRef(0);

  useEffect(() => {
    const addNext = () => {
      const idx = msgIdx.current;
      if (idx >= chatData.length) return;
      const msg = chatData[idx];
      if (msg.role === "ai") {
        setShowTyping(true);
        setTimeout(() => {
          setShowTyping(false);
          setMessages(m => [...m, msg]);
          msgIdx.current++;
          if (msgIdx.current < chatData.length) {
            setTimeout(addNext, chatData[msgIdx.current].delay || 500);
          }
        }, 900);
      } else {
        setMessages(m => [...m, msg]);
        msgIdx.current++;
        if (msgIdx.current < chatData.length) {
          setTimeout(addNext, chatData[msgIdx.current].delay || 500);
        }
      }
    };
    setTimeout(addNext, 400);
  }, []);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, showTyping]);

  const sendMsg = (text) => {
    const t = text || input;
    if (!t.trim()) return;
    setMessages(m => [...m, { role: "user", text: t }]);
    setInput("");
    setShowTyping(true);
    setTimeout(() => {
      setShowTyping(false);
      setMessages(m => [...m, {
        role: "ai",
        text: "感谢您的反馈！我已记录您的情况，并将同步给您的健康管理团队。如有紧急情况，请立即联系主治医师张明远 📞",
      }]);

  return (
    <div className="screen slide-enter" style={{ background: "#FFF8F3", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, " + assistant.color + ", " + assistant.color + "CC)", padding: "0 20px 16px", flexShrink: 0 }}>
        <StatusBar light />
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div onClick={onBack} style={{ width: 36, height: 36, borderRadius: 12, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18, color: "#fff" }}>←</div>
          <div style={{ width: 44, height: 44, borderRadius: 14, background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>{assistant.emoji}</div>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{assistant.name}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#4ADE80" }} />
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)" }}>AI专属助手 · 在线</div>
            </div>
          </div>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: "auto", padding: "16px 16px", display: "flex", flexDirection: "column", gap: 12, scrollbarWidth: "none" }}>
        {/* System msg */}
        <div style={{ textAlign: "center", fontSize: 11, color: "#B07050", background: "rgba(0,0,0,0.04)", padding: "6px 14px", borderRadius: 20, alignSelf: "center" }}>

      {/* Input */}
      <div style={{ padding: "8px 16px 32px", background: "#fff", borderTop: "1px solid #F0E4DA", display: "flex", gap: 10, alignItems: "center", flexShrink: 0 }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: "#FFF0E8", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18 }}>📷</div>
        <input
          style={{ flex: 1, border: "2px solid #F0E4DA", borderRadius: 20, padding: "10px 16px", fontSize: 14, outline: "none", background: "#FFF8F3", color: "#1F1200" }}
          placeholder="输入您的问题..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && sendMsg()}
        />
        <div onClick={() => sendMsg()}
          style={{ width: 40, height: 40, borderRadius: 12, background: input.trim() ? "linear-gradient(135deg, #FF6B2B, #FF8E53)" : "#F0E4DA", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all 0.2s", fontSize: 16, color: input.trim() ? "#fff" : "#ccc" }}>
          ➤
        </div>
      </div>
    </div>
  );
}

// ─── Screen: Check-In ─────────────────────────────────────────────────────────
function CheckinScreen() {
  const [items, setItems] = useState(CHECKIN_ITEMS);
  const [recording, setRecording] = useState(null);
  const [inputVal, setInputVal] = useState("");
  const [mood, setMood] = useState(null);
  const [streak] = useState(14);

  const done = items.filter(i => i.done).length;

  const toggle = (id) => {
    if (id === "mood") { setRecording("mood"); return; }
    if (id === "temp") { setRecording("temp"); return; }
    setItems(items.map(i => i.id === id ? {...i, done: true} : i));
  };

  const submitRecording = () => {
    setItems(items.map(i => i.id === recording ? {...i, done: true, value: recording === "mood" ? ["😊","😐","😔"][mood] + " " + ["心情不错","一般般","有点低落"][mood] : inputVal} : i));
    setRecording(null); setInputVal(""); setMood(null);
  };

  const moods = [
    { emoji: "😊", label: "心情不错" },
    { emoji: "😐", label: "一般般" },
    { emoji: "😔", label: "有点低落" },
  ];

  return (
    <div className="screen" style={{ background: "#FFF8F3", paddingBottom: 90 }}>
      <StatusBar />
      <div style={{ padding: "0 20px" }}>
        {/* Streak */}
        <div style={{ background: "linear-gradient(135deg, #FF6B2B, #FFB347)", borderRadius: 20, padding: "20px", marginBottom: 16, position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", right: -20, top: -20, fontSize: 100, opacity: 0.1 }}>🔥</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.8)", marginBottom: 4 }}>连续打卡</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 4 }}>
            <div style={{ fontSize: 48, fontWeight: 700, color: "#fff", lineHeight: 1 }}>{streak}</div>
            <div style={{ fontSize: 20, color: "rgba(255,255,255,0.9)", paddingBottom: 6 }}>天 🔥</div>
          </div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.75)", marginTop: 4 }}>继续保持！再打卡 1 天解锁「坚持不懈」勋章 🏆</div>
        </div>

        {/* Calendar strip */}
        <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px", marginBottom: 16, boxShadow: "0 4px 16px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#1F1200", marginBottom: 12 }}>本周打卡</div>
          <div style={{ display: "flex", gap: 6, justifyContent: "space-between" }}>
            {["一","二","三","四","五","六","日"].map((d, i) => {
              const isToday = i === 0;
              const done2 = i < 6;
              return (
                <div key={d} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <div style={{ fontSize: 11, color: isToday ? "#FF6B2B" : "#B07050" }}>{d}</div>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: done2 ? (isToday ? "#FF6B2B" : "#FFD4B8") : "#F0E4DA", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>
                    {done2 ? "✓" : ""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Progress */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#1F1200" }}>📊 今日健康记录</div>
          <div style={{ fontSize: 13, color: "#FF6B2B", fontWeight: 600 }}>{done}/{items.length} 完成</div>
        </div>

        <div className="progress-bar" style={{ marginBottom: 16 }}>
          <div className="progress-fill" style={{ width: `${done / items.length * 100}%`, background: "linear-gradient(90deg, #FF6B2B, #FFB347)" }} />
        </div>

        {/* Items */}
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {items.map((item, i) => (
            <div key={item.id} onClick={() => !item.done && toggle(item.id)}
              style={{
                background: "#fff", borderRadius: 16, padding: "14px 16px",
                display: "flex", alignItems: "center", gap: 14, cursor: item.done ? "default" : "pointer",
                boxShadow: "0 2px 10px rgba(0,0,0,0.05)",
                border: `2px solid ${item.done ? item.color + "30" : "transparent"}`,
                transition: "all 0.2s", animation: `fadeUp 0.4s ease ${i * 0.06}s both`,
              }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: item.done ? item.color + "20" : "#F8F5F2", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
                {item.emoji}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#1F1200" }}>{item.label}</div>
                {item.done && item.value && (
                  <div style={{ fontSize: 13, color: item.color, fontWeight: 600, marginTop: 2 }}>{item.value} {item.unit}</div>
                )}
                {!item.done && <div style={{ fontSize: 12, color: "#B07050", marginTop: 2 }}>点击记录</div>}
              </div>
              <div style={{
                width: 28, height: 28, borderRadius: "50%",
                background: item.done ? item.color : "transparent",
                border: `2px solid ${item.done ? item.color : "#E0D4CA"}`,
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                transition: "all 0.3s"
              }}>
                {item.done && <span style={{ color: "#fff", fontSize: 14 }}>✓</span>}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Recording modal */}
      {recording && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "flex-end", zIndex: 500 }} onClick={e => e.target === e.currentTarget && setRecording(null)}>
          <div style={{ background: "#fff", borderRadius: "24px 24px 0 0", padding: "24px 24px 48px", width: "100%", animation: "fadeUp 0.3s ease" }}>
            <div style={{ width: 40, height: 4, borderRadius: 2, background: "#E0D4CA", margin: "0 auto 20px" }} />
            {recording === "mood" ? (
              <>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#1F1200", marginBottom: 20 }}>今天心情怎么样？</div>
                <div style={{ display: "flex", gap: 14, marginBottom: 24, justifyContent: "center" }}>
                  {moods.map((m, i) => (
                    <div key={i} onClick={() => setMood(i)}
                      style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer", padding: "12px 20px", borderRadius: 16, background: mood === i ? "#FFF0E8" : "#F8F5F2", border: `2px solid ${mood === i ? "#FF6B2B" : "transparent"}`, transition: "all 0.2s" }}>
                      <div style={{ fontSize: 36 }}>{m.emoji}</div>
                      <div style={{ fontSize: 12, color: "#7C4A2D" }}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#1F1200", marginBottom: 16 }}>记录体温</div>
                <input className="input-field" type="number" placeholder="请输入体温，例如 36.5" value={inputVal} onChange={e => setInputVal(e.target.value)} style={{ marginBottom: 20 }} />
              </>
            )}
            <button className="btn-primary" onClick={submitRecording} disabled={recording === "mood" ? mood === null : !inputVal}>
              确认记录 ✓
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [flow, setFlow] = useState("splash");
  const [navTab, setNavTab] = useState("home");
  const [chatAssistant, setChatAssistant] = useState("nutrition");
  const [inChat, setInChat] = useState(false);

  const handleNav = (tab) => {
    setNavTab(tab);
    if (tab === "chat") setInChat(false);
  };

  const handleAssistant = (id) => {
    setChatAssistant(id);
    setInChat(true);
    setNavTab("chat");
    setFlow("main");
  };

  const showNav = flow === "main" && !inChat;

  if (flow === "splash") return (
    <>
      <SplashScreen onNext={() => setFlow("type")} />
    </>
  );
  if (flow === "type") return (
    <TypeScreen onNext={() => setFlow("form")} onBack={() => setFlow("splash")} />
  );
  if (flow === "form") return (
    <FormScreen onNext={() => { setFlow("main"); setNavTab("home"); }} onBack={() => setFlow("type")} />
  );

  return (
    <>
      {navTab === "home" && <HomeScreen onNav={handleNav} onAssistant={handleAssistant} />}
      {navTab === "chat" && !inChat && <AssistantsScreen onChat={(id) => { setChatAssistant(id); setInChat(true); }} />}
      {navTab === "chat" && inChat && <ChatScreen assistantId={chatAssistant} onBack={() => setInChat(false)} />}
      {navTab === "checkin" && <CheckinScreen />}
      {navTab === "profile" && (
        <div className="screen" style={{ background: "#FFF8F3" }}>
          <StatusBar />
          <div style={{ padding: "0 20px" }}>
            <div style={{ textAlign: "center", padding: "20px 0 30px" }}>
              <div style={{ width: 80, height: 80, borderRadius: "50%", background: "linear-gradient(135deg, #FF6B2B, #FFB347)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, margin: "0 auto 12px" }}>😊</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#1F1200" }}>李小明</div>
              <div style={{ fontSize: 13, color: "#7C4A2D", marginTop: 4 }}>食管癌 · 术后第14天</div>
              <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12 }}>
                <div className="tag tag-orange">🏆 14天连续打卡</div>
                <div className="tag tag-green">⭐ 健康达人</div>
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 20, padding: 20, boxShadow: "0 4px 16px rgba(0,0,0,0.06)" }}>
              {[
                { emoji: "👨‍⚕️", label: "主治医师", value: "张明远" },
                { emoji: "👩‍⚕️", label: "个案管理师", value: "李华" },
                { emoji: "🏥", label: "就诊医院", value: "荣科附属医院" },
                { emoji: "📅", label: "下次随访", value: "4月20日 14:00" },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: i < 3 ? "1px solid #F5EDE8" : "none" }}>
                  <div style={{ fontSize: 22 }}>{item.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, color: "#B07050" }}>{item.label}</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#1F1200", marginTop: 2 }}>{item.value}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {showNav && <BottomNav active={navTab} onNav={handleNav} />}
    </>
  );
}

ReactDOM.render(<App />, document.getElementById("app"));
</script>
</body>
</html>
